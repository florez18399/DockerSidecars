version: '3.8'

services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: monitoring-grafana
    hostname: grafana
    environment:
      - GF_INSTALL_PLUGINS=trino-datasource,redis-datasource
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "3000:3000"
    networks:
      - hdfs-net
      - main_net
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      # Deshabilita el aprovisionamiento de dashboards desde archivos para permitir guardarlos desde la UI.
      # - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

networks:
  hdfs-net:
    external: true
    name: hdfs-backbone
  main_net:
    external: true
    name: main_gateway_net

volumes:
  grafana-storage:
    driver: local
