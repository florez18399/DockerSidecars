[SERVICE]
    # This is a good practice for production, flushing logs every 5 seconds.
    Flush        5
    Log_Level    info

[INPUT]
    # Tailing a file is a robust way to collect logs.
    Name         tail
    Path         /var/log/envoy/access.log
    # Envoy is writing one JSON object per line, so we can parse it directly.
    Parser       json
    # Tag the records for routing to the correct output.
    Tag          envoy.access

[OUTPUT]
    Name         kafka
    Match        envoy.access
    # This address works because we are adding a 'kafka' service in docker-compose.
    Brokers      kafka:9092
    # The Kafka topic where logs will be sent.
    Topics       envoy-logs
    # Send the log record as a JSON message.
    Format       json