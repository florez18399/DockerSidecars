networks:
  trino-net:
    driver: bridge

  hdfs-net:
    external: true
    name: hdfs-backbone

services:
  metastore-db:
    image: postgres:14
    container_name: metastore-db
    hostname: metastore-db
    networks:
      - hdfs-net
      - trino-net
    environment:
      - POSTGRES_DB=metastore        
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hivepass
    volumes:
      - metastore-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: apache/hive:4.1.0
    container_name: hive-metastore
    hostname: hive-metastore
    networks:
      - hdfs-net
      - trino-net
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
    volumes:
      - ../hive-config/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./hive-drivers/postgresql-42.6.0.jar:/opt/hive/lib/postgresql-42.6.0.jar:ro
      - ./hive-drivers/postgresql-42.6.0.jar:/usr/lib/hive/lib/postgresql-42.6.0.jar:ro
      - ./hive-initialization:/opt/hive/hive-initialization:ro
    entrypoint: []
    command: ["/opt/hive/hive-initialization/init-hive.sh"]
    depends_on:
      metastore-db:
        condition: service_healthy

  trino:
    image: trinodb/trino:448
    container_name: trino
    hostname: trino
    user: "0:0"
    networks:
      - hdfs-net
      - trino-net
    ports:
      - "8080:8080"
    environment:
      - TRINO_NODE_ID=trino-coordinator
    volumes:
      - ./trino-config/config.properties:/etc/trino/config.properties:ro
      - ./trino-config/jvm.config:/etc/trino/jvm.config:ro
      - ./trino-config/node.properties:/etc/trino/node.properties:ro
      - ./trino-config/catalog:/etc/trino/catalog:ro
      - ../hadoop-config:/opt/hadoop-config:ro
      - trino-coord-data:/var/trino/data
    deploy:
      resources:
        limits:
          memory: 2G
    depends_on:
      - hive-metastore

  trino-worker-1:
    image: trinodb/trino:448
    container_name: trino-worker-1
    hostname: trino-worker-1
    user: "0:0"
    networks:
      - hdfs-net
      - trino-net
    environment:
      - TRINO_NODE_ID=trino-worker-1
    volumes:
      - ./trino-config/config-worker.properties:/etc/trino/config.properties:ro
      - ./trino-config/jvm-worker.config:/etc/trino/jvm.config:ro
      - ./trino-config/node.properties:/etc/trino/node.properties:ro
      - ./trino-config/catalog:/etc/trino/catalog:ro
      - ../hadoop-config:/opt/hadoop-config:ro
      - trino-worker1-data:/var/trino/data
    deploy:
      resources:
        limits:
          memory: 2.5G
    depends_on:
      - trino

  trino-worker-2:
    image: trinodb/trino:448
    container_name: trino-worker-2
    hostname: trino-worker-2
    user: "0:0"
    networks:
      - hdfs-net
      - trino-net
    environment:
      - TRINO_NODE_ID=trino-worker-2
    volumes:
      - ./trino-config/config-worker.properties:/etc/trino/config.properties:ro
      - ./trino-config/jvm-worker.config:/etc/trino/jvm.config:ro
      - ./trino-config/node.properties:/etc/trino/node.properties:ro
      - ./trino-config/catalog:/etc/trino/catalog:ro
      - ../hadoop-config:/opt/hadoop-config:ro
      - trino-worker2-data:/var/trino/data
    deploy:
      resources:
        limits:
          memory: 2.5G
    depends_on:
      - trino

  # Sincronizador
  hive-sync-service:
    image: curlimages/curl:latest
    container_name: hive-sync-service
    networks:
      - hdfs-net
      - trino-net
    volumes:
      - ./synchronizer:/synchronizer
    command: ["/bin/sh", "/synchronizer/synchronizer.sh"]
    depends_on:
      - hive-metastore
      - trino

volumes:
  metastore-pg-data:
    driver: local
  trino-coord-data:
    driver: local
  trino-worker1-data:
    driver: local
  trino-worker2-data:
    driver: local